<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HexWorld Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #13131f;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .75rem 1.25rem;
      background: #1e1e2e;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    header h1 { margin: 0; font-size: 1.1rem; letter-spacing: .05em; }

    .open-btn {
      cursor: pointer;
      background: #45475a;
      border: 1px solid #585b70;
      color: #cdd6f4;
      padding: .35rem .85rem;
      border-radius: .4rem;
      font-size: .9rem;
    }
    .open-btn:hover { background: #585b70; }

    #file-input { display: none; }

    #status {
      color: #6c7086;
      font-size: .85rem;
    }

    #tooltip {
      margin-left: auto;
      font-size: .85rem;
      color: #a6adc8;
      min-width: 18rem;
      text-align: right;
    }

    #map {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    svg .hex-group { cursor: default; }
    svg .hex-group:hover .hex-outline { stroke: #cba6f7; stroke-width: 2.5; }

    #edge-label {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .85rem;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>

<header>
  <h1>HexWorld</h1>
  <label class="open-btn" for="file-input">Open files</label>
  <!--
    SELECT ANY COMBINATION of:

    map.json          — the WFC output (required)

    Individual tile images (png / jpg / svg / webp):
      grass.png, road_straight.svg, …
      The filename stem (without extension) must match the tile name in the JSON.

    Atlas image + tiles.json config:
      tiles.json format —
      {
        "atlas": {
          "file": "spritesheet.png",      ← must match the selected image filename
          "tiles": {
            "grass":         [  0,   0, 64, 64],   ← [x, y, width, height] in atlas pixels
            "road_straight": [ 64,   0, 64, 64],
            "road_end":      [128,   0, 64, 64]
          }
        }
      }
      Atlas entries and individual image files can be mixed freely.
      Atlas entries take priority when both exist for the same tile name.
  -->
  <input type="file" id="file-input" accept=".json,.png,.jpg,.jpeg,.svg,.webp" multiple>
  <span id="status">No map loaded</span>
  <label id="edge-label">
    <input type="checkbox" id="edge-toggle"> Edges
  </label>
  <span id="tooltip"></span>
</header>

<div id="map"></div>

<script>
  // ── constants ────────────────────────────────────────────────────────────────
  const SIZE           = 52;    // hex circumradius in px
  const PADDING        = SIZE + 16;
  const HEX_FILL       = "#c8b48a";
  const HEX_FILL_EMPTY = "#2a2a3e";
  const HEX_STROKE     = "#555566";
  const NS             = "http://www.w3.org/2000/svg";

  // ── edge colours ─────────────────────────────────────────────────────────────
  const EDGE_COLORS = {
    grass: "#5fa845",
    road:  "#c97b2e",
    water:  "#1f77b4",
    river:  "#2ac7d9",
    coast:  "#e5c16a",
  };

  // ── geometry ─────────────────────────────────────────────────────────────────
  function hexVertices(cx, cy, r) {
    return Array.from({length: 6}, (_, i) => [
      cx + r * Math.cos(i * Math.PI / 3),
      cy + r * Math.sin(i * Math.PI / 3),
    ]);
  }

  // Flat-top hex cube → pixel (matches hex_map._DIRECTIONS ordering)
  function hexToPixel(q, r) {
    return [
      SIZE * 1.5 * q,
      SIZE * (Math.sqrt(3) / 2 * q + Math.sqrt(3) * r),
    ];
  }

  function pts(verts) {
    return verts.map(([x, y]) => `${x.toFixed(2)},${y.toFixed(2)}`).join(" ");
  }

  function el(tag, attrs = {}) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  // ── helpers ──────────────────────────────────────────────────────────────────
  function readAsText(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = ev => res(ev.target.result);
      r.onerror = rej;
      r.readAsText(file);
    });
  }

  function loadImageSize(url) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload  = () => res({ w: img.naturalWidth, h: img.naturalHeight });
      img.onerror = rej;
      img.src = url;
    });
  }

  // ── tile resolver ────────────────────────────────────────────────────────────
  // Builds: tileName → { type:'image', url }
  //                  | { type:'atlas', url, x,y,w,h, atlasW,atlasH }
  async function buildResolver(config, imageUrls) {
    const resolver = {};

    if (config?.atlas) {
      const { file: atlasFile, tiles } = config.atlas;
      const url = imageUrls[atlasFile];
      if (url && tiles) {
        const { w: atlasW, h: atlasH } = await loadImageSize(url);
        for (const [name, region] of Object.entries(tiles)) {
          const [x, y, w, h] = Array.isArray(region)
            ? region
            : [region.x, region.y, region.w, region.h];
          resolver[name] = { type: 'atlas', url, x, y, w, h, atlasW, atlasH };
        }
      }
    }

    // Individual image files fill in anything not covered by the atlas.
    // The filename stem (without extension) becomes the tile name.
    for (const [filename, url] of Object.entries(imageUrls)) {
      const stem = filename.replace(/\.[^.]+$/, '');
      if (!resolver[stem]) {
        resolver[stem] = { type: 'image', url };
      }
    }

    return resolver;
  }

  // ── render one tile image into its hex cell ──────────────────────────────────
  // Tiles are clipped to the hex polygon and rotated by rotation×60° around the
  // hex centre so only the base (rotation=0) image is needed per tile type.
  function renderTileImage(g, cx, cy, rotation, info, clipId) {
    const outer = el("g", { "clip-path": `url(#${clipId})` });
    const inner = el("g", {
      transform: `rotate(${-rotation * 60},${cx.toFixed(2)},${cy.toFixed(2)})`,
    });

    if (info.type === 'image') {
      // preserveAspectRatio="slice" scales to cover the bounding box (like CSS cover)
      inner.appendChild(el("image", {
        href:   info.url,
        x:      (cx - SIZE).toFixed(2),
        y:      (cy - SIZE).toFixed(2),
        width:  (SIZE * 2).toFixed(2),
        height: (SIZE * 2).toFixed(2),
        preserveAspectRatio: "xMidYMid slice",
      }));
    } else {
      // Atlas: scale the tile region to cover the hex bounding box, then
      // position the full atlas image so the region is centred at (cx, cy).
      const { url, x, y, w, h, atlasW, atlasH } = info;
      const scale = (SIZE * 2) / Math.min(w, h);
      inner.appendChild(el("image", {
        href:   url,
        x:      (cx - scale * (x + w / 2)).toFixed(2),
        y:      (cy - scale * (y + h / 2)).toFixed(2),
        width:  (atlasW * scale).toFixed(2),
        height: (atlasH * scale).toFixed(2),
      }));
    }

    outer.appendChild(inner);
    g.appendChild(outer);
  }

  // ── render edge highlights ───────────────────────────────────────────────────
  function renderEdgeColors(g, cx, cy, edges) {
    const verts = hexVertices(cx, cy, SIZE);
    const INSET = 2;
    edges.forEach((name, i) => {
      const color = EDGE_COLORS[name];
      if (!color) return;
      const [x1, y1] = verts[i];
      const [x2, y2] = verts[(i + 1) % 6];
      // shift the line segment toward the hex centre by INSET pixels
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      const dist = Math.hypot(cx - mx, cy - my);
      const ox = (cx - mx) / dist * INSET;
      const oy = (cy - my) / dist * INSET;
      g.appendChild(el("line", {
        x1: (x1 + ox).toFixed(2), y1: (y1 + oy).toFixed(2),
        x2: (x2 + ox).toFixed(2), y2: (y2 + oy).toFixed(2),
        stroke: color,
        "stroke-width": "5",
        "stroke-linecap": "round",
      }));
    });
  }

  // ── render map ───────────────────────────────────────────────────────────────
  function renderMap(mapData, resolver) {
    const showEdges = document.getElementById("edge-toggle").checked;
    const positions = mapData.nodes.map(n => hexToPixel(n.q, n.r));

    const xs   = positions.map(([x]) => x);
    const ys   = positions.map(([, y]) => y);
    const minX = Math.min(...xs) - PADDING;
    const minY = Math.min(...ys) - PADDING;
    const w    = Math.max(...xs) + PADDING - minX;
    const h    = Math.max(...ys) + PADDING - minY;

    const svg  = el("svg", { viewBox: `${minX} ${minY} ${w} ${h}`, width: w, height: h });
    const defs = el("defs");
    svg.appendChild(defs);

    mapData.nodes.forEach((node, idx) => {
      const [cx, cy] = positions[idx];
      const verts    = hexVertices(cx, cy, SIZE);
      const polyPts  = pts(verts);
      const clipId   = `c${idx}`;

      const clip = el("clipPath", { id: clipId });
      clip.appendChild(el("polygon", { points: polyPts }));
      defs.appendChild(clip);

      const g = el("g", { class: "hex-group" });

      g.appendChild(el("polygon", {
        points: polyPts,
        fill:   node.tile ? HEX_FILL : HEX_FILL_EMPTY,
      }));

      if (node.tile) {
        const info = resolver[node.tile.name]
          ?? { type: 'image', url: `tiles/${node.tile.name}.png` };
        renderTileImage(g, cx, cy, node.tile.rotation, info, clipId);
      }

      g.appendChild(el("polygon", {
        class:          "hex-outline",
        points:         polyPts,
        fill:           "none",
        stroke:         HEX_STROKE,
        "stroke-width": "1.5",
      }));

      if (showEdges && node.tile?.edges) {
        renderEdgeColors(g, cx, cy, node.tile.edges);
      }

      g.dataset.q = node.q;
      g.dataset.r = node.r;
      g.dataset.s = node.s;
      if (node.tile) g.dataset.tile = `${node.tile.name}  r${node.tile.rotation}`;

      svg.appendChild(g);
    });

    const tooltip = document.getElementById("tooltip");
    svg.addEventListener("mouseover", ev => {
      const group = ev.target.closest(".hex-group");
      if (!group) { tooltip.textContent = ""; return; }
      const coord = `(${group.dataset.q}, ${group.dataset.r}, ${group.dataset.s})`;
      tooltip.textContent = group.dataset.tile
        ? `${coord}  ·  ${group.dataset.tile}`
        : `${coord}  ·  (uncollapsed)`;
    });
    svg.addEventListener("mouseleave", () => { tooltip.textContent = ""; });

    const map = document.getElementById("map");
    map.innerHTML = "";
    map.appendChild(svg);
  }

  // ── file loading ─────────────────────────────────────────────────────────────
  let lastRender = null;

  document.getElementById("edge-toggle").addEventListener("change", () => {
    if (lastRender) renderMap(lastRender.mapData, lastRender.resolver);
  });

  document.getElementById("file-input").addEventListener("change", async ev => {
    const files = Array.from(ev.target.files);
    if (!files.length) return;

    const statusEl = document.getElementById("status");
    statusEl.textContent = "Loading…";

    let mapData      = null;
    let config       = null;
    const imageUrls  = {};  // filename → object URL

    for (const file of files) {
      const ext = file.name.split('.').pop().toLowerCase();
      try {
        if (ext === 'json') {
          const data = JSON.parse(await readAsText(file));
          if (Array.isArray(data.nodes)) {
            mapData = data;
          } else {
            config = data;
          }
        } else if (['png', 'jpg', 'jpeg', 'svg', 'webp'].includes(ext)) {
          imageUrls[file.name] = URL.createObjectURL(file);
        }
      } catch (err) {
        statusEl.textContent = `Error in ${file.name}: ${err.message}`;
        return;
      }
    }

    if (!mapData) {
      statusEl.textContent = "No map JSON found in selection.";
      return;
    }

    try {
      const resolver  = await buildResolver(config, imageUrls);
      lastRender = { mapData, resolver };
      renderMap(mapData, resolver);
      const n         = mapData.nodes.length;
      const collapsed = mapData.nodes.filter(nd => nd.tile).length;
      const imgCount  = Object.keys(resolver).length;
      statusEl.textContent =
        `${n} nodes · ${collapsed} collapsed · ${imgCount} tile image${imgCount !== 1 ? "s" : ""} loaded`;
    } catch (err) {
      statusEl.textContent = `Render error: ${err.message}`;
    } finally {
      // Reset so re-selecting the same filename always fires the change event.
      ev.target.value = "";
    }
  });
</script>
</body>
</html>
